<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalotsavam | Grand Arts Festival</title>
    
    <!-- Fonts: Cinematic Serif + Clean Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- CSS VARIABLES & THEME --- */
        :root {
            --color-bg: #030305;
            --color-panel: rgba(20, 20, 25, 0.7);
            --color-primary: #d4af37; /* Metallic Gold */
            --color-primary-light: #f9e08e;
            --color-primary-dim: #6b561f;
            --color-accent: #8a1c1c; /* Deep Maroon */
            --color-text-main: #f0f0f0;
            --color-text-muted: #888;
            --color-success: #2ecc71;
            --color-danger: #e74c3c;
            
            --font-display: 'Cinzel', serif;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Lato', sans-serif;

            --shadow-glow: 0 0 20px rgba(212, 175, 55, 0.15);
            --shadow-card: 0 15px 35px rgba(0, 0, 0, 0.6);
            --border-radius: 12px;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- RESET & BASE --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--color-bg);
            color: var(--color-text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient Background Effects */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(128, 28, 28, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%);
            z-index: -2;
        }

        /* Noise Texture Overlay */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MDAiIGhlaWdodD0iNTAwIj48ZmlsdGVyIGlkPSJnoiPjxmZVR1cmJ1bGVuY2UgdHlwZT0iZnJhY3RhbE5vaXNlIiBiYXNlRnJlcXVlbmN5PSIwLjY1IiBudW1PY3RhdmVzPSIzIiBzdGl0Y2hUaWxlcz0ic3RpdGNoIi8+PC9maWx0ZXI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsdGVyPSJ1cmwoI2cpIiBvcGFjaXR5PSIwLjAzIi8+PC9zdmc+');
            pointer-events: none; z-index: -1;
        }

        /* --- UTILITIES --- */
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .text-gold { color: var(--color-primary); }
        .mt-4 { margin-top: 1rem; }
        .mb-4 { margin-bottom: 1rem; }

        /* --- ANIMATIONS --- */
        @keyframes flicker {
            0%, 100% { transform: scale(1); opacity: 1; }
            25% { transform: scale(1.05); opacity: 0.9; }
            50% { transform: scale(0.95); opacity: 1; }
            75% { transform: scale(1.02); opacity: 0.85; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        /* --- COMPONENTS --- */
        
        /* Typography */
        h1, h2, h3 { font-family: var(--font-display); letter-spacing: 2px; text-transform: uppercase; }
        h2 { 
            font-size: 2rem; margin-bottom: 1.5rem; 
            color: var(--color-primary); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            padding-bottom: 0.5rem; display: inline-block; 
            text-shadow: 0 0 10px rgba(212,175,55,0.2);
        }

        /* Buttons */
        .btn {
            padding: 0.9rem 2rem;
            border: 1px solid var(--color-primary);
            background: rgba(212, 175, 55, 0.05);
            color: var(--color-primary);
            font-family: var(--font-display);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        /* Button Shine Effect */
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
            transition: 0s;
        }
        .btn:hover::before { left: 150%; transition: 0.7s ease-in-out; }

        .btn:hover {
            background: var(--color-primary);
            color: #000;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        .btn:active { transform: translateY(0); }
        
        .btn-primary { background: var(--color-primary); color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.3); }
        .btn-danger { border-color: var(--color-danger); color: var(--color-danger); background: rgba(231, 76, 60, 0.05); }
        .btn-danger:hover { background: var(--color-danger); color: white; box-shadow: 0 0 20px rgba(231,76,60,0.4); }

        /* Back Button */
        .back-home-btn {
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-family: var(--font-body);
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 1rem 0;
            margin-bottom: 0.5rem;
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .back-home-btn:hover { 
            color: var(--color-primary); 
            transform: translateX(-8px); 
            text-shadow: 0 0 8px rgba(212,175,55,0.4);
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-main);
            font-family: var(--font-body);
            transition: var(--transition-smooth);
            border-radius: 4px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        /* Cards */
        .card {
            background: var(--color-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-card);
            position: relative;
        }

        /* --- LAYOUTS --- */
        
        /* Header */
        header {
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { 
            font-family: var(--font-display); 
            font-size: 1.6rem; 
            font-weight: 800;
            color: var(--color-primary); 
            text-shadow: 0 0 20px rgba(212,175,55,0.3); 
            letter-spacing: 3px;
        }

        /* Auth Screen */
        .auth-container {
            max-width: 480px;
            margin: 3rem auto;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 3rem 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
            position: relative;
            animation: fadeInUp 0.8s ease-out;
        }
        .auth-container::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--color-primary), transparent, var(--color-primary));
            z-index: -1;
            border-radius: 14px;
            opacity: 0.3;
        }
        .tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--color-text-muted); transition: 0.3s; font-weight: 700; letter-spacing: 1px; font-size: 0.9rem;}
        .tab.active { color: var(--color-primary); border-bottom: 2px solid var(--color-primary); }

        /* Student Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 3rem;
            padding: 3rem;
            min-height: calc(100vh - 80px);
            animation: fadeInUp 0.8s ease-out;
        }
        
        /* Stage Pass (Sidebar) */
        .stage-pass {
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            border: 1px solid var(--color-primary);
            text-align: center;
            padding: 2.5rem 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            box-shadow: 0 0 30px rgba(212,175,55,0.1);
            position: relative;
            overflow: hidden;
        }
        .stage-pass::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        
        .pass-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; margin-bottom: 1.5rem; position: relative; z-index: 1;}
        .slot-counter {
            font-family: var(--font-display);
            font-size: 1.1rem;
            color: var(--color-text-muted);
            margin: 1.5rem 0;
            letter-spacing: 1px;
        }
        .slot-counter span { 
            font-size: 2.2rem; 
            font-weight: bold; 
            color: var(--color-primary); 
            display: block; 
            margin: 8px 0; 
            text-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        
        .save-status { margin-top: 1.5rem; font-size: 0.8rem; color: #555; letter-spacing: 1px; }

        /* Event Selection Area */
        .event-section { margin-bottom: 4rem; }
        .section-title {
            color: var(--color-text-main);
            font-family: var(--font-display);
            font-size: 1.8rem;
            margin-bottom: 2rem;
            border-left: 4px solid var(--color-accent);
            padding-left: 1.5rem;
            text-shadow: 0 0 15px rgba(138, 28, 28, 0.3);
        }
        
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }
        
        .event-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            /* Animation applied via inline style for stagger */
            opacity: 0; 
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Hover Effects */
        .event-card:hover {
            transform: translateY(-8px);
            border-color: var(--color-primary);
            background: rgba(30, 30, 35, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        
        /* Selected State */
        .event-card.selected {
            border: 1px solid var(--color-success);
            background: rgba(46, 204, 113, 0.05);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.1);
        }
        .event-card.selected h4 { color: var(--color-success); }
        
        .event-card.selected::after {
            content: 'SELECTED';
            position: absolute; top: 10px; right: 10px;
            color: var(--color-success);
            font-family: var(--font-display);
            font-size: 0.6rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--color-success);
            padding: 2px 6px;
            border-radius: 2px;
        }

        .event-card h4 { 
            color: #fff; 
            font-family: var(--font-heading); 
            margin-bottom: 0.8rem; 
            font-size: 1.1rem; 
            font-weight: 600;
        }
        .event-card span { font-size: 0.75rem; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 1.5px; }

        /* Admin Dashboard */
        .admin-panel { padding: 3rem; animation: fadeInUp 0.6s ease-out; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { 
            background: rgba(20, 20, 25, 0.6); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 2rem; 
            border-radius: 8px; 
            transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--color-primary); transform: translateY(-3px); }
        .stat-card h3 { font-size: 0.85rem; color: var(--color-text-muted); margin-bottom: 0.5rem; font-family: var(--font-body); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .val { font-size: 2.5rem; color: var(--color-primary); font-family: var(--font-display); text-shadow: 0 0 15px rgba(212,175,55,0.2); }

        .data-table-container {
            overflow-x: auto;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { 
            background: rgba(40, 40, 50, 0.5); 
            color: var(--color-primary); 
            font-family: var(--font-display); 
            font-size: 0.8rem; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Toast Notification */
        #toast {
            position: fixed; bottom: 40px; right: 40px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--color-primary);
            color: #fff; padding: 1rem 2rem;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(100px); opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            display: flex; align-items: center; gap: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        #toast.show { transform: translateY(0); opacity: 1; }
        #toast.error { border-color: var(--color-danger); color: #ffcccc; }

        /* Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease;
        }
        .lamp-flame {
            width: 30px; height: 60px;
            background: radial-gradient(ellipse at bottom, #ffeb3b 0%, #ff9800 60%, transparent 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 50px #ff9800, 0 0 100px #ffeb3b;
            animation: flicker 3s infinite ease-in-out;
            margin-bottom: 2rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .stage-pass { position: relative; top: 0; margin-bottom: 3rem; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            header { padding: 1.5rem; }
        }
    </style>
</head>

        // --- BACK BUTTON COMPONENT ---
        const BACK_BUTTON_HTML = `
            <button onclick="goHome()" class="back-home-btn">

        // --- STATE MANAGEMENT ---
        
        const State = {

            init: function() {
                const storedUser = localStorage.getItem('kalotsavam_user');
                if (storedUser) {
                    this.currentUser = JSON.parse(storedUser);
                    this.view = 'student-dashboard';
                }
                
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').remove(), 1000);
                }, 1800);

                this.render();
            },

            login: async function(regNo, password) {
                const students = JSON.parse(localStorage.getItem('kalotsavam_students') || '[]');
                const user = students.find(s => s.regNo === regNo);
                
                if (!user) {
                    showToast('User not found. Please register.', 'error');
                    return;
                }

                const inputHash = await hashPassword(password);
                if (inputHash === user.passwordHash) {
                    this.currentUser = user;
                    localStorage.setItem('kalotsavam_user', JSON.stringify(user));
                    this.view = 'student-dashboard';
                    showToast(`Welcome, ${user.name}`);
                    this.render();
                } else {
                    showToast('Invalid Register Number or Password.', 'error');
                }
            },

            register: async function(userData) {
                const students = JSON.parse(localStorage.getItem('kalotsavam_students') || '[]');
                
                if (students.find(s => s.regNo === userData.regNo)) {
                    showToast('Register Number already exists!', 'error');
                    return;
                }

                userData.passwordHash = await hashPassword(userData.password);
                delete userData.password;
                userData.events = []; 
                userData.id = Date.now().toString();
                
                students.push(userData);
                localStorage.setItem('kalotsavam_students', JSON.stringify(students));
                
                showToast('Registration Successful! Please Login.', 'success');
                switchAuthTab('login');
            },

            adminLogin: function(username, password) {
                if (username === CONSTANTS.ADMIN_USER && password === 'GPTCpalakkad#123') {
                    this.currentUser = { role: 'admin', name: 'Administrator' };
                    this.view = 'admin-dashboard';
                    showToast('Control Room Access Granted');
                    this.render();
                } else {
                    showToast('Invalid Admin Credentials', 'error');
                }
            },

            logout: function() {
                this.currentUser = null;
                localStorage.removeItem('kalotsavam_user');
                this.view = 'home';
                showToast('Logged out successfully');
                this.render();
            },

            goHome: function() {
                this.view = 'home';
                this.render();
                window.scrollTo(0, 0);

            toggleEventSelection: function(eventId) {
                if (!this.currentUser || this.currentUser.role === 'admin') return;

                const students = JSON.parse(localStorage.getItem('kalotsavam_students') || '[]');
                const userIndex = students.findIndex(s => s.id === this.currentUser.id);
                if (userIndex === -1) return;

                let user = JSON.parse(JSON.stringify(students[userIndex])); 
                const event = EVENT_LIST.find(e => e.id === eventId);
                const isSelected = user.events.includes(eventId);

                if (!isSelected) {
                    const singleCount = user.events.filter(id => EVENT_LIST.find(e => e.id === id).type === 'single').length;
                    const groupCount = user.events.filter(id => EVENT_LIST.find(e => e.id === id).type === 'group').length;
                    const totalCount = user.events.length;

                    if (totalCount >= CONSTANTS.MAX_TOTAL_EVENTS) {
                        showToast(`Maximum ${CONSTANTS.MAX_TOTAL_EVENTS} events allowed.`, 'error');
                        return;
                    }
                    if (event.type === 'single' && singleCount >= CONSTANTS.MAX_SINGLE_EVENTS) {
                        showToast(`Maximum ${CONSTANTS.MAX_SINGLE_EVENTS} Single items allowed.`, 'error');
                        return;
                    }
                    if (event.type === 'group' && groupCount >= CONSTANTS.MAX_GROUP_EVENTS) {
                        showToast(`Maximum ${CONSTANTS.MAX_GROUP_EVENTS} Group items allowed.`, 'error');
                        return;
                    }
                    
                    user.events.push(eventId);
                    showToast(`Added: ${event.name}`);
                } else {
                    user.events = user.events.filter(id => id !== eventId);
                    showToast(`Removed: ${event.name}`);
                }

                this.currentUser.events = user.events;
                localStorage.setItem('kalotsavam_user', JSON.stringify(this.currentUser));
                this.render();
            },

            saveRegistration: function() {
                if (!this.currentUser || this.currentUser.role === 'admin') return;

                const students = JSON.parse(localStorage.getItem('kalotsavam_students') || '[]');
                const userIndex = students.findIndex(s => s.id === this.currentUser.id);
                
                if (userIndex !== -1) {
                    students[userIndex].events = this.currentUser.events;
                    localStorage.setItem('kalotsavam_students', JSON.stringify(students));
                    showToast('✅ Registrations Saved Successfully!', 'success');
                    this.render();
                } else {
                    showToast('Error saving data.', 'error');
                }
            },

            deleteRegistration: function(userId) {
                if(!confirm("Are you sure you want to delete this student's registration?")) return;
                
                const students = JSON.parse(localStorage.getItem('kalotsavam_students') || '[]');
                const newStudents = students.filter(s => s.id !== userId);
                localStorage.setItem('kalotsavam_students', JSON.stringify(newStudents));
                showToast('Registration deleted', 'success');
                this.render();
            },

                    case 'student-dashboard':

                        break;
                    case 'admin-login':
                        app.innerHTML = BACK_BUTTON_HTML + Views.adminAuth();

                    case 'admin-dashboard':

        // --- UTILS ---

        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        function showToast(msg, type = 'normal') {
            const toast = document.getElementById('toast');
            const txt = document.getElementById('toast-msg');
            const icon = document.getElementById('toast-icon');
            
            txt.innerText = msg;
            toast.className = type === 'error' ? 'error' : '';
            icon.innerHTML = type === 'error' ? '⚠' : '✔';
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- GLOBAL HANDLERS ---

        function navigateTo(view) {
            State.view = view;
            State.render();
            window.scrollTo(0, 0);
        }

        function goHome() {
            State.goHome();
        }

        function switchAuthTab(tab) {
            const loginForm = document.getElementById('form-login');
            const regForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const regTab = document.getElementById('tab-register');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                regForm.classList.add('hidden');
                loginTab.classList.add('active');
                regTab.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                regForm.classList.remove('hidden');
                loginTab.classList.remove('active');
                regTab.classList.add('active');
            }
        }

        async function handleStudentLogin(e) {
            e.preventDefault();
            const regNo = document.getElementById('login-regno').value.trim();
            const pass = document.getElementById('login-pass').value;
            await State.login(regNo, pass);

        async function handleStudentRegister(e) {
            e.preventDefault();
            const userData = {
                name: document.getElementById('reg-name').value.trim(),
                regNo: document.getElementById('reg-regno').value.trim(),
                dept: document.getElementById('reg-dept').value.trim(),
                semester: document.getElementById('reg-sem').value,

                email: document.getElementById('reg-email').value.trim(),
                password: document.getElementById('reg-pass').value

            await State.register(userData);
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value;
            State.adminLogin(user, pass);
        }

        // --- BOOTSTRAP ---
        window.addEventListener('DOMContentLoaded', () => {
            State.init();
        });

    </script>
